<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Data Matrix | HSIE Simulation</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #0b0f19; overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* Hidden layout container */
        .wrapper { width: 100%; height: 100%; position: relative; }
        
        /* The main cloud gaming display */
        iframe {
            width: 100%; height: 100%; border: none;
            position: absolute; top: 0; left: 0;
        }
        
        /* Panic overlay controls */
        .panic-bar {
            position: fixed; top: 10px; left: 50%;
            transform: translateX(-50%); z-index: 99999;
            background: rgba(15, 23, 42, 0.85);
            padding: 8px 16px; border-radius: 30px;
            backdrop-filter: blur(10px); display: flex; gap: 10px;
        }
        .btn {
            background: #ef4444; color: white; border: none;
            padding: 6px 14px; border-radius: 20px;
            font-size: 12px; font-weight: bold; cursor: pointer;
        }
        .btn-blue { background: #3b82f6; }
    </style>
</head>
<body>

    <!-- Overlay controls to quickly close the game matrix if a teacher walks by -->
    <div class="panic-bar">
        <button class="btn btn-blue" onclick="togglePointer()">🖱️ Lock/Unlock Mouse</button>
        <button class="btn" onclick="emergencyClose()">⚠️ Quick Close</button>
    </div>

    <div class="wrapper">
        <!-- Direct proxy route to an open-source, computer-supported browser port -->
        <iframe id="cloudFrame" 
                src="https://github.io" 
                allow="autoplay; gamepad; keyboard-map; pointer-lock;"
                allowfullscreen>
        </iframe>
    </div>

    <script>
        // Forces the browser to capture mouse movements for shooting/aiming tracking
        function togglePointer() {
            const frame = document.getElementById('cloudFrame');
            frame.contentWindow.focus();
        }

        // Instantly redirects the tab to the official NSW student login window
        function emergencyClose() {
            window.location.href = "https://det.nsw.edu.au";
        }
    </script>

</body>
</html>
